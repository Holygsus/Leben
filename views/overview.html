<section class="view-header">
  <h1>Übersicht</h1>
</section>

<section class="panel" id="marked-projects-panel" hidden>
  <h2>Projekte</h2>
  <ul class="project-list" id="marked-project-list"></ul>
</section>

<section class="filter-bar">
  <select id="filter-effort" class="select" aria-label="Nach Aufwand filtern">
    <option value="">Alle Aufwände</option>
    <option value="5">5 Min</option>
    <option value="10">10 Min</option>
    <option value="30">30 Min</option>
    <option value="60">60 Min</option>
  </select>
  <select id="filter-status" class="select" aria-label="Nach Status filtern">
    <option value="">Alle Status</option>
    <option value="open">Offen</option>
    <option value="planned">Geplant</option>
    <option value="done">Erledigt</option>
  </select>
</section>

<div class="area-tree" id="area-tree"></div>

<section class="panel" id="no-area-panel" hidden>
  <h2>Ohne Bereich</h2>
  <ul class="brainstorm-list" id="brainstorm-list"></ul>
</section>

<section class="panel">
  <h2>Neue Aufgabe</h2>
  <form id="new-task-form" class="new-task-form">
    <input class="input" type="text" id="new-task-title" placeholder="Titel" required autocomplete="off" />
    <select id="new-task-area" class="select" aria-label="Bereich">
      <option value="">Bereich wählen</option>
    </select>
    <select id="new-task-project" class="select" aria-label="Projekt / Ordner">
      <option value="">Kein Projekt</option>
    </select>
    <select id="new-task-effort" class="select" aria-label="Aufwand">
      <option value="">Aufwand</option>
      <option value="5">5 Min</option>
      <option value="10">10 Min</option>
      <option value="30">30 Min</option>
      <option value="60">60 Min</option>
    </select>
    <button class="btn" type="submit">Anlegen</button>
  </form>
</section>
