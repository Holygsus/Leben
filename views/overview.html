<section class="view-header">
  <h1>Übersicht</h1>
</section>

<section class="area-chips" id="area-chips"></section>

<section class="filter-bar">
  <select id="filter-effort" class="select" aria-label="Nach Aufwand filtern">
    <option value="">Alle Aufwände</option>
    <option value="5">5 Min</option>
    <option value="10">10 Min</option>
    <option value="30">30 Min</option>
    <option value="60">60 Min</option>
  </select>
  <select id="filter-status" class="select" aria-label="Nach Status filtern">
    <option value="">Alle Status</option>
    <option value="open">Offen</option>
    <option value="planned">Geplant</option>
    <option value="done">Erledigt</option>
  </select>
</section>

<ul class="task-list" id="overview-task-list"></ul>
<p class="empty-state" id="overview-empty-state" hidden>Keine Aufgaben gefunden.</p>

<section class="panel">
  <h2>Neue Aufgabe</h2>
  <form id="new-task-form" class="new-task-form">
    <input class="input" type="text" id="new-task-title" placeholder="Titel" required autocomplete="off" />
    <select id="new-task-area" class="select">
      <option value="">Bereich wählen</option>
    </select>
    <select id="new-task-project" class="select">
      <option value="">Projekt (optional)</option>
    </select>
    <select id="new-task-effort" class="select">
      <option value="">Aufwand</option>
      <option value="5">5 Min</option>
      <option value="10">10 Min</option>
      <option value="30">30 Min</option>
      <option value="60">60 Min</option>
    </select>
    <button class="btn" type="submit">Anlegen</button>
  </form>
</section>

<section class="panel">
  <h2>Projekte</h2>
  <ul class="project-list" id="project-list"></ul>
</section>

<section class="panel">
  <h2>Brainstorm</h2>
  <form id="overview-brainstorm-form" class="field-row">
    <input class="input" type="text" id="overview-brainstorm-input" placeholder="Schnell notieren…" autocomplete="off" />
    <button class="btn" type="submit" aria-label="Hinzufügen">+</button>
  </form>
  <ul class="brainstorm-list" id="brainstorm-list"></ul>
</section>
