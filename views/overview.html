<section class="view-header">
  <div class="view-title-group">
    <div class="view-icon-badge"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>
    <h1>Übersicht</h1>
  </div>
  <div class="view-header-actions">
    <button type="button" class="icon-btn" id="area-add-btn" aria-label="Neuer Bereich">+</button>
    <button type="button" class="icon-btn" id="area-manage-toggle" aria-label="Bereiche bearbeiten">⚙</button>
  </div>
</section>

<section class="panel" id="area-manage-panel" hidden>
  <h2>Bereiche</h2>
  <ul class="area-manage-list" id="area-manage-list"></ul>
  <form id="new-area-form" class="new-area-form">
    <input class="input" type="text" id="new-area-name" placeholder="Name" required autocomplete="off" />
    <input class="color-input" type="color" id="new-area-color" value="#378ADD" aria-label="Farbe" />
    <span class="color-warning" id="new-area-color-warning" hidden title="Dieser Farbton ist auf hellem oder dunklem Hintergrund schwer erkennbar.">⚠</span>
    <button class="btn" type="submit">Anlegen</button>
  </form>
</section>

<section class="panel" id="pinned-tasks-panel" hidden>
  <h2>Angeheftet</h2>
  <ul class="project-list" id="pinned-task-list"></ul>
</section>

<div class="filter-toggle-row">
  <button type="button" class="filter-toggle-btn" id="filter-toggle" aria-expanded="false" aria-controls="filter-bar">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
    Filter <span class="filter-count" id="filter-count" hidden></span>
  </button>
</div>

<section class="filter-bar" id="filter-bar" hidden>
  <input type="search" id="filter-search" class="input" placeholder="Aufgaben durchsuchen…" aria-label="Aufgaben durchsuchen" />
  <select id="filter-effort" class="select" aria-label="Nach Aufwand filtern">
    <option value="">Alle Aufwände</option>
    <option value="5">5 Min</option>
    <option value="10">10 Min</option>
    <option value="30">30 Min</option>
    <option value="60">60 Min</option>
  </select>
  <select id="filter-status" class="select" aria-label="Nach Status filtern">
    <option value="">Alle Status</option>
    <option value="open">Offen</option>
    <option value="planned">Geplant</option>
    <option value="done">Erledigt</option>
  </select>
  <label class="checkbox-label">
    <input type="checkbox" id="filter-show-done" />
    Erledigte anzeigen
  </label>
</section>

<div class="area-tree" id="area-tree"></div>

<section class="panel" id="no-area-panel" hidden>
  <h2>Ohne Bereich</h2>
  <div class="bulk-toolbar" id="brainstorm-bulk-toolbar" hidden></div>
  <ul class="brainstorm-list" id="brainstorm-list"></ul>
</section>
