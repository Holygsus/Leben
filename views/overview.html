<section class="view-header">
  <h1>Übersicht</h1>
</section>

<section class="panel" id="pinned-tasks-panel" hidden>
  <h2>Angeheftet</h2>
  <ul class="project-list" id="pinned-task-list"></ul>
</section>

<section class="filter-bar">
  <input type="search" id="filter-search" class="input" placeholder="Aufgaben durchsuchen…" aria-label="Aufgaben durchsuchen" />
  <select id="filter-effort" class="select" aria-label="Nach Aufwand filtern">
    <option value="">Alle Aufwände</option>
    <option value="5">5 Min</option>
    <option value="10">10 Min</option>
    <option value="30">30 Min</option>
    <option value="60">60 Min</option>
  </select>
  <select id="filter-status" class="select" aria-label="Nach Status filtern">
    <option value="">Alle Status</option>
    <option value="open">Offen</option>
    <option value="planned">Geplant</option>
    <option value="done">Erledigt</option>
  </select>
  <label class="checkbox-label">
    <input type="checkbox" id="filter-show-done" />
    Erledigte anzeigen
  </label>
</section>

<div class="area-tree" id="area-tree"></div>

<section class="panel" id="no-area-panel" hidden>
  <h2>Ohne Bereich</h2>
  <div class="bulk-toolbar" id="brainstorm-bulk-toolbar" hidden></div>
  <ul class="brainstorm-list" id="brainstorm-list"></ul>
</section>

<section class="panel">
  <h2>Neue Aufgabe</h2>
  <form id="new-task-form" class="new-task-form">
    <input class="input" type="text" id="new-task-title" placeholder="Titel" required autocomplete="off" />
    <select id="new-task-area" class="select" aria-label="Bereich">
      <option value="">Bereich wählen</option>
    </select>
    <select id="new-task-parent" class="select" aria-label="Übergeordnete Aufgabe">
      <option value="">Keine übergeordnete Aufgabe</option>
    </select>
    <select id="new-task-effort" class="select" aria-label="Aufwand">
      <option value="">Aufwand</option>
      <option value="5">5 Min</option>
      <option value="10">10 Min</option>
      <option value="30">30 Min</option>
      <option value="60">60 Min</option>
    </select>
    <div class="date-chips" id="new-task-date-chips" role="group" aria-label="Datum">
      <button type="button" class="date-chip" data-date="today">Heute</button>
      <button type="button" class="date-chip" data-date="tomorrow">Morgen</button>
      <button type="button" class="date-chip" data-date="" data-active="true">Kein Datum</button>
      <button type="button" class="date-chip" data-date="custom">Datum…</button>
      <input type="date" class="input date-chip-custom-input" aria-label="Eigenes Datum" hidden />
    </div>
    <button class="btn" type="submit">Anlegen</button>
  </form>
</section>
