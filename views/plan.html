<section class="view-header">
  <div class="view-title-group" style="--view-accent: var(--color-success);">
    <div class="view-icon-badge"><svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M4 9h16M5 6h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"/></svg></div>
    <h1>Plan</h1>
  </div>
  <div class="plan-date-picker">
    <button type="button" class="chip-btn" id="plan-date-today">Heute</button>
    <button type="button" class="chip-btn" id="plan-date-tomorrow">Morgen</button>
    <input type="date" class="input" id="plan-date-input" aria-label="Datum wählen" />
  </div>
  <p class="plan-date" id="plan-date"></p>
</section>

<section class="panel">
  <h2>Vorschlag</h2>
  <p class="plan-budget" id="plan-budget"></p>
  <ul class="task-list" id="suggested-task-list"></ul>
  <div class="empty-state-rich" id="suggested-empty-state" hidden>
  <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
  <strong>Kein Vorschlag verfügbar</strong>
  <span>Es gibt aktuell keine offenen Aufgaben, aus denen sich ein Vorschlag bauen lässt.</span>
</div>
  <button class="btn btn-secondary" type="button" id="refresh-suggestion">Neu vorschlagen</button>
</section>

<section class="panel">
  <div class="month-grid-header">
    <button type="button" class="icon-btn" id="month-prev" aria-label="Vorheriger Monat">‹</button>
    <p class="month-grid-label" id="month-grid-label"></p>
    <button type="button" class="icon-btn" id="month-next" aria-label="Nächster Monat">›</button>
  </div>
  <div class="month-grid-weekdays">
    <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
  </div>
  <div class="month-grid" id="month-grid"></div>
  <div class="week-day-panel" id="week-day-panel" hidden>
    <p class="week-day-panel-heading" id="week-day-panel-heading"></p>
    <ul class="task-list" id="week-day-panel-list"></ul>
    <p class="empty-state" id="week-day-panel-empty" hidden>Für diesen Tag ist noch nichts eingeplant.</p>
  </div>
</section>

<section class="panel">
  <h2>Weitere Aufgabe hinzufügen</h2>
  <select id="add-task-select" class="select">
    <option value="">Aufgabe wählen…</option>
  </select>
</section>

<section class="panel">
  <button class="btn" type="button" id="confirm-plan">Plan bestätigen</button>
  <p class="status-message" id="plan-status"></p>
</section>

<section class="panel">
  <h2>Export</h2>
  <button class="btn btn-secondary" type="button" id="export-tasks">Offene Aufgaben kopieren</button>
  <p class="status-message" id="export-status"></p>
  <button class="btn btn-secondary" type="button" id="export-all-json">Alle Daten als Datei exportieren</button>
  <p class="status-message" id="export-all-status"></p>
</section>
