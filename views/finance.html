<section class="view-header">
  <div class="view-title-group" style="--view-accent: var(--color-accent-warm);">
    <div class="view-icon-badge"><svg viewBox="0 0 24 24"><path d="M3 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1h13M16 13h2"/></svg></div>
    <h1>Finanzen</h1>
  </div>
  <div class="view-header-actions">
    <button type="button" class="icon-btn" id="tx-quick-toggle" aria-label="Transaktion erfassen"><span class="inline-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
  </div>
</section>

<form class="quick-capture-panel" id="tx-quick-form" hidden>
  <div class="priority-chips" id="tx-quick-direction" role="group" aria-label="Einnahme oder Ausgabe">
    <button type="button" class="priority-chip" data-direction="expense" data-active="true">Ausgabe</button>
    <button type="button" class="priority-chip" data-direction="income">Einnahme</button>
  </div>
  <input type="number" class="input" id="tx-quick-amount" placeholder="Betrag (€)" step="0.01" min="0" inputmode="decimal" required />
  <div class="pot-chips" id="tx-quick-pot" role="group" aria-label="Topf">
    <button type="button" class="pot-chip" data-pot="fixkosten" style="--pot-color: var(--color-text-subtle)">Fixkosten</button>
    <button type="button" class="pot-chip" data-pot="sicherheit" style="--pot-color: var(--color-accent)">Sicherheit</button>
    <button type="button" class="pot-chip" data-pot="wachstum" style="--pot-color: var(--color-success)">Wachstum</button>
    <button type="button" class="pot-chip" data-pot="freiheit" data-active="true" style="--pot-color: var(--color-accent-warm)">Freiheit</button>
  </div>
  <select class="select" id="tx-quick-category" aria-label="Kategorie (optional)">
    <option value="">Kategorie (optional)</option>
    <option value="essen">Essen</option>
    <option value="wohnen">Wohnen/Fixkosten</option>
    <option value="transport">Transport</option>
    <option value="freizeit">Freizeit</option>
    <option value="gesundheit">Gesundheit</option>
    <option value="sonstiges">Sonstiges</option>
  </select>
  <label class="checkbox-label" id="tx-quick-notgroschen-toggle" hidden>
    <input type="checkbox" id="tx-quick-notgroschen-checkbox" />
    Rückfluss aus dem Notgroschen
  </label>
  <input type="text" class="input" id="tx-quick-note" placeholder="Notiz (optional)" autocomplete="off" />
  <div class="quick-capture-actions">
    <button class="btn" type="submit">Hinzufügen</button>
    <button class="btn btn-secondary" type="button" id="tx-quick-cancel">Abbrechen</button>
  </div>
</form>

<div class="pot-grid" id="pot-grid"></div>

<section class="panel" id="budget-trend-panel">
  <h2>Tagesbudget-Trend</h2>
  <p class="status-message" id="budget-trend-text"></p>
</section>

<section class="panel" id="category-donut-panel" hidden>
  <h2>Ausgaben nach Kategorie</h2>
  <div class="category-donut-row" id="category-donut-row"></div>
</section>

<div class="events-widget" id="buyready-card" hidden>
  <div class="events-widget-header">
    <span class="inline-icon"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg></span>
    <span>Kaufbereit</span>
  </div>
  <ul class="events-widget-list" id="buyready-list"></ul>
  <button type="button" class="events-widget-more" id="buyready-more" hidden></button>
</div>

<ul class="task-list" id="committed-preview-list"></ul>

<section class="filter-bar">
  <select id="tx-filter-pot" class="select" aria-label="Nach Topf filtern">
    <option value="">Alle Töpfe</option>
    <option value="fixkosten">Fixkosten</option>
    <option value="sicherheit">Sicherheit</option>
    <option value="wachstum">Wachstum</option>
    <option value="freiheit">Freiheit</option>
  </select>
</section>
<ul class="task-list" id="transaction-list"></ul>
<div class="empty-state-rich" id="transaction-empty-state" hidden>
  <svg viewBox="0 0 24 24"><path d="M3 10h18M7 15h3M3 6h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/></svg>
  <strong>Noch keine Bewegung</strong>
  <span>Erfasse deine erste Ausgabe oder Einnahme über das + oben.</span>
</div>

<section class="panel">
  <div class="panel-header">
    <h2>Fixkosten</h2>

  </div>
</section>

<section class="panel">
  <div class="panel-header">
    <h2>Verpflichtende Ausgaben</h2>
    <a href="#/verpflichtende-ausgaben" class="icon-btn" aria-label="Verpflichtende Ausgaben verwalten"><span class="inline-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></a>
  </div>
</section>

<section class="panel">
  <h2>Wunschliste</h2>
  <div id="wishlist-cards"></div>
  <form id="new-wishlist-form" class="inline-add-form">
    <input class="input" type="text" id="new-wishlist-title" placeholder="Neuer Wunsch (z.B. RAM 32GB DDR5)" autocomplete="off" required />
    <button class="btn" type="submit">Hinzufügen</button>
  </form>
</section>
