<section class="view-header">
  <h1>Bereiche</h1>
</section>

<ul class="area-manage-list" id="area-manage-list"></ul>

<section class="panel">
  <h2>Neuer Bereich</h2>
  <form id="new-area-form" class="new-area-form">
    <input class="input" type="text" id="new-area-name" placeholder="Name" required autocomplete="off" />
    <input class="color-input" type="color" id="new-area-color" value="#378ADD" aria-label="Farbe" />
    <button class="btn" type="submit">Anlegen</button>
  </form>
</section>

<section class="panel">
  <h2>Einmalige Migration</h2>
  <p>Wandelt bestehende Projekte/Ordner in Aufgaben mit Unteraufgaben um. Nur einmal ausführen.</p>
  <button class="btn" id="run-migration-btn" type="button">Projekte zu Aufgaben migrieren</button>
  <p class="status-message" id="migration-status"></p>
</section>
