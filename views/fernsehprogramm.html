<section class="view-header">
  <div class="view-title-group">
    <div class="view-icon-badge"><svg viewBox="0 0 24 24"><path d="M3 5h18v12H3z"/><path d="M8 21h8M12 17v4M8 2l3 3M16 2l-3 3"/></svg></div>
    <h1>Fernsehprogramm</h1>
  </div>
  <div class="view-header-actions">
    <button type="button" class="icon-btn" id="watchlist-quick-add-toggle" aria-label="Watchlist-Eintrag hinzufügen"><span class="inline-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
  </div>
</section>

<form class="quick-capture-panel" id="watchlist-quick-form" hidden>
  <input type="text" class="input" id="watchlist-quick-title" placeholder="Titel (Serie, Anime, Film)" autocomplete="off" required />
  <select class="select" id="watchlist-quick-type" aria-label="Typ">
    <option value="serie">Serie</option>
    <option value="anime">Anime</option>
    <option value="film">Film</option>
    <option value="doku">Doku</option>
    <option value="youtube">YouTube</option>
  </select>
  <div class="quick-capture-actions">
    <button class="btn" type="submit">Hinzufügen</button>
    <button class="btn btn-secondary" type="button" id="watchlist-quick-cancel">Abbrechen</button>
  </div>
</form>

<section class="panel">
  <h2>Diese Woche</h2>
  <ul class="task-list" id="watchlist-week-list"></ul>
  <div class="empty-state-rich" id="watchlist-week-empty-state" hidden>
    <svg viewBox="0 0 24 24"><path d="M3 5h18v12H3z"/><path d="M8 21h8M12 17v4M8 2l3 3M16 2l-3 3"/></svg>
    <strong>Noch nichts eingeplant</strong>
    <span>Leg über "+" Einträge an und setze sie auf "aktiv".</span>
  </div>
</section>

<section class="panel">
  <div class="panel-header">
    <h2>Watchlist</h2>
    <button type="button" class="icon-btn" id="watchlist-toggle" aria-label="Watchlist anzeigen"><span class="inline-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></button>
  </div>
  <div id="watchlist-panel" hidden>
    <section class="filter-bar">
      <select id="watchlist-filter-type" class="select" aria-label="Nach Typ filtern">
        <option value="">Alle Typen</option>
        <option value="serie">Serie</option>
        <option value="anime">Anime</option>
        <option value="film">Film</option>
        <option value="doku">Doku</option>
        <option value="youtube">YouTube</option>
      </select>
      <input type="text" class="input" id="watchlist-filter-genre" placeholder="Genre" autocomplete="off" />
      <select id="watchlist-filter-rating" class="select" aria-label="Nach Bewertung filtern">
        <option value="">Alle Bewertungen</option>
        <option value="7">Ø ≥ 7</option>
        <option value="8">Ø ≥ 8</option>
        <option value="9">Ø ≥ 9</option>
      </select>
    </section>
    <ul class="events-widget-list" id="watchlist-overview-list"></ul>
    <button type="button" class="events-widget-more" id="watchlist-overview-more" hidden></button>
    <div class="empty-state-rich" id="watchlist-overview-empty-state" hidden>
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      <strong>Watchlist ist leer</strong>
      <span>Leg oben über "+" deinen ersten Eintrag an.</span>
    </div>
  </div>
</section>
