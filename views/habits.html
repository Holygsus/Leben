<section class="view-header">
  <div class="view-title-group">
    <div class="view-icon-badge"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M2 12a10 10 0 1 0 10-10"/></svg></div>
    <h1>Habits</h1>
  </div>
  <div class="view-header-actions">
    <button type="button" class="icon-btn" id="habit-quick-add-toggle" aria-label="Habit hinzufügen">+</button>
  </div>
</section>

<form class="quick-capture-panel" id="habit-quick-form" hidden>
  <input type="text" class="input" id="habit-quick-title" placeholder="Titel (z.B. Gym)" autocomplete="off" required />
  <input type="text" class="input" id="habit-quick-subtask" placeholder="Erste Aufgabe (optional, z.B. Stunde Elden Ring)" autocomplete="off" />
  <div class="quick-capture-actions">
    <button class="btn" type="submit">Anlegen</button>
    <button class="btn btn-secondary" type="button" id="habit-quick-cancel">Abbrechen</button>
  </div>
</form>

<section class="panel">
  <ul class="task-list" id="habit-list"></ul>
</section>
