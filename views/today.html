<section class="today-greeting">
  <div class="today-greeting-row">
    <div>
      <h1 id="greeting-text"></h1>
      <p class="today-date" id="today-date"></p>
    </div>
    <button type="button" class="icon-btn" id="quick-add-toggle" aria-label="Aufgabe hinzufügen">+</button>
  </div>
  <div class="gym-indicator" id="gym-indicator" hidden></div>
</section>

<form class="quick-capture-panel" id="brainstorm-form" hidden>
  <input type="text" class="input" id="brainstorm-input" placeholder="Was steht an?" autocomplete="off" required />
  <select class="select" id="brainstorm-area" aria-label="Bereich">
    <option value="">Bereich (optional)</option>
  </select>
  <div class="effort-chips" id="brainstorm-effort" role="group" aria-label="Aufwand">
    <button type="button" class="effort-chip" data-effort="5">5</button>
    <button type="button" class="effort-chip" data-effort="10">10</button>
    <button type="button" class="effort-chip" data-effort="30">30</button>
    <button type="button" class="effort-chip" data-effort="60">60</button>
  </div>
  <div class="priority-chips" id="brainstorm-priority" role="group" aria-label="Priorität">
    <button type="button" class="priority-chip" data-priority="low">Niedrig</button>
    <button type="button" class="priority-chip" data-priority="medium" data-active="true">Mittel</button>
    <button type="button" class="priority-chip" data-priority="high">Hoch</button>
  </div>
  <div class="quick-capture-actions">
    <button class="btn" type="submit">Hinzufügen</button>
    <button class="btn btn-secondary" type="button" id="quick-add-cancel">Abbrechen</button>
  </div>
</form>

<section class="events-widget" id="events-widget" hidden>
  <div class="events-widget-header">
    <span class="inline-icon"><svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M4 9h16M5 6h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"/></svg></span>
    <span>Anstehende Termine</span>
  </div>
  <ul class="events-widget-list" id="events-widget-list"></ul>
  <button type="button" class="events-widget-more" id="events-widget-more" hidden></button>
</section>

<div class="events-widget" id="buyready-card" hidden>
  <div class="events-widget-header">
    <span class="inline-icon"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg></span>
    <span>Kaufbereit</span>
  </div>
  <ul class="events-widget-list" id="buyready-list"></ul>
  <button type="button" class="events-widget-more" id="buyready-more" hidden></button>
</div>

<section class="progress-section">
  <div class="progress-label">
    <span id="progress-text"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
  </div>
</section>

<div class="quick-win-card" id="quick-win-card" hidden>
  <span class="inline-icon quick-win-icon"><svg viewBox="0 0 24 24"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg></span>
  <button type="button" class="task-checkbox" id="quick-win-checkbox" aria-label="Quick Win erledigt"></button>
  <span class="task-title" id="quick-win-title"></span>
  <button type="button" class="icon-btn" id="quick-win-reroll" aria-label="Neuen Quick Win würfeln">⟳</button>
</div>

<ul class="task-list" id="task-list"></ul>
<p class="empty-state" id="empty-state" hidden>Nichts geplant für heute — leg über das + oben eine Aufgabe an.</p>
