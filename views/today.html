<section class="today-greeting">
  <h1 id="greeting-text"></h1>
  <p class="today-date" id="today-date"></p>
  <div class="gym-indicator" id="gym-indicator" hidden></div>
</section>

<section class="progress-section">
  <div class="progress-label">
    <span id="progress-text"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
  </div>
</section>

<ul class="task-list" id="task-list"></ul>
<div class="empty-state-rich" id="empty-state" hidden>
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  <strong>Nichts geplant für heute</strong>
  <span>Leg unten schnell eine Aufgabe an oder genieß den freien Tag.</span>
</div>

<form class="brainstorm-pill" id="brainstorm-form">
  <div class="brainstorm-options" id="brainstorm-options" hidden>
    <select class="select" id="brainstorm-area" aria-label="Bereich">
      <option value="">Bereich (optional)</option>
    </select>
    <div class="effort-chips" id="brainstorm-effort" role="group" aria-label="Aufwand">
      <button type="button" class="effort-chip" data-effort="5">5</button>
      <button type="button" class="effort-chip" data-effort="10">10</button>
      <button type="button" class="effort-chip" data-effort="30">30</button>
      <button type="button" class="effort-chip" data-effort="60">60</button>
    </div>
  </div>
  <div class="brainstorm-row">
    <input type="text" id="brainstorm-input" placeholder="Schnell notieren…" autocomplete="off" />
    <button type="submit" aria-label="Hinzufügen">+</button>
  </div>
</form>
